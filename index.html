<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subhan Technical Studio // System Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Leaflet CSS for Map Architecture -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: #131a2c;
            --bg-card: #1a233d;
            --border-glow: rgba(14, 165, 233, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-cyan: #0ea5e9;
            --accent-purple: #a855f7;
            --accent-amber: #f59e0b;
            --accent-emerald: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .font-tech {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Webflow Style Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface);
            border: 2px solid var(--bg-base);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }

        /* Container Framework */
        .mainframe {
            max-w: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header System */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            border-b: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 0;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
        }

        .brand-logo i {
            color: white;
            font-size: 1.2rem;
            animation: pulseGlow 2s infinite ease-in-out;
        }

        .brand-text {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .terminal-trigger {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-trigger:hover {
            color: var(--accent-cyan);
            border-color: rgba(14, 165, 233, 0.4);
            background: rgba(14, 165, 233, 0.05);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.1);
        }

        /* Hero Deployment Zone */
        .hero {
            padding: 96px 0 64px 0;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .badge-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(14, 165, 233, 0.06);
            border: 1px solid rgba(14, 165, 233, 0.15);
            padding: 6px 16px;
            border-radius: 100px;
            color: var(--accent-cyan);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .badge-pill span {
            width: 6px;
            height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
        }

        .hero h1 span {
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            max-width: 640px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }

        .action-group {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), #0284c7);
            color: white;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(14, 165, 233, 0.35);
        }

        .btn-secondary {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Webflow Inspired Grid Matrix */
        .section-title {
            text-align: center;
            margin-bottom: 64px;
        }

        .section-title h2 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .section-title p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            margin-bottom: 96px;
        }

        .showcase-card {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 32px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .showcase-card:hover {
            transform: translateY(-6px);
            border-color: rgba(14, 165, 233, 0.2);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
            margin-bottom: 24px;
        }

        .icon-thumb { background: rgba(239, 68, 68, 0.08); color: #ef4444; }
        .icon-graphic { background: rgba(14, 165, 233, 0.08); color: var(--accent-cyan); }
        .icon-writer { background: rgba(245, 158, 11, 0.08); color: var(--accent-amber); }

        .showcase-card h3 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .showcase-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* 3D and High Conversion Preview Subsystems */
        .preview-viewport {
            background: #060913;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            aspect-ratio: 16/10;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Thumbnail Live Component Mock */
        .mock-thumbnail {
            position: absolute;
            inset: 0;
